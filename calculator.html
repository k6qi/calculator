<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kevins Calculator</title>
    <script src="calculator.js"> </script>
    <link rel='stylesheet' href="calculator.css">
</head>
<body>  
        <div class="calculator">
            <div class = 'calculator-keys'>
                <div class="calculator-display"> DISPLAY FILLER</div>
                <button type="button" value="AC" class="clear-button" > AC  </button>
                <button type="button" value="/" class="operator" > / </button>
                <button type="button" value="7" > 7 </button>
                <button type="button" value="8" > 8 </button>
                <button type="button" value="9" > 9 </button>
                <button type="button" value="x" class="operator"> x</button>
                <button type="button" value="4" > 4 </button>
                <button type="button" value="5" > 5 </button>
                <button type="button" value="6" > 6 </button>
                <button type="button" value="-" class="operator"> - </button>
                <button type="button" value="1"> 1 </button>
                <button type="button" value="2" > 2 </button>
                <button type="button" value="3" > 3 </button>
                <button type="button" value="+" class="operator"> + </button>
                <button type="button" value="0" class="zero"> 0 </button>
                <button type="button" value="." class="decimal"> . </button>
                <button type="button" value="=" class="operator"> = </button>
            </div>
        
        </div>
    
    
</body>
</html>
